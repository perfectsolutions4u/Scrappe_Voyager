<div
  [routerLink]="['/destination', destination?.slug]"
  role="button"
  class="destination-cart cPointer d-flex flex-column rounded-4 overflow-hidden transition"
>
  <figure class="img-Hove rounded-4 overflow-hidden position-relative mb-0">
    <img
      class="w-100 h-100 object-fit-cover transition"
      [src]="destination?.banner"
      loading="lazy"
      [title]="destination?.title"
      [alt]="destination?.title"
    />
    <figcaption class="p-2 text-center text-capitalize fw-bold d-flex flex-column justify-content-end">
      <h3 [routerLink]="['/destination', destination?.slug]" class="transition fs-5 mt-2">
        {{ destination?.title }}
      </h3>
      <h4 class="transition fs-6">
        tours
        <b class="textSecondColor">({{ destination?.tours_count }})</b>
      </h4>
    </figcaption>
  </figure>
</div>
