<div class="d-flex flex-column min-vh-100 justify-content-between">
  <app-nav></app-nav>
  <router-outlet></router-outlet>
  <app-footer></app-footer>
</div>

<!-- what's app icon -->
<app-whatsapp-icon></app-whatsapp-icon>

<!-- spinner - only show in browser (not SSR) -->
@if (isBrowser()) {
  <ngx-spinner
    bdColor="rgba(255,255,255)"
    size="large"
    color="#c4a164"
    [fullScreen]="true"
    >
    <!-- loading video -->
    <figure>
      <img src="../assets/image/scrappe-loader.gif" alt="scarabée voyageur loader" class="w-100 h-100 object-fit-cover">
    </figure>   
    <!-- typing animation: character by character -->
    <p class="typing-text textMainColor text-center fw-bolder mt-3 fs-1 text-uppercase">
      {{ typingText() }}<span class="typing-cursor" aria-hidden="true">|</span>
    </p>
  </ngx-spinner>
  }
